name: sepsis-management-openenv
version: "1.2"
description: >-
  Deterministic sepsis-management simulator for OpenEnv-style evaluation.
  The environment models realistic clinical decision-making across early sepsis,
  severe sepsis, and septic shock using a backend API and a standalone inference loop.

metadata:
  category: sepsis_management
  difficulty_levels:
    early_sepsis: easy
    severe_sepsis: medium
    septic_shock: hard

runtime:
  entrypoint: inference:main
  backend_entrypoint: python -u server/app.py
  max_runtime_minutes: 20
  compute: cpu-only
  memory_limit: 8GB

api:
  base_url: http://127.0.0.1:7860
  health_endpoint: /health
  endpoints:
    reset:
      path: /reset
      method: POST
    step:
      path: /step
      method: POST
    state:
      path: /state
      method: GET

models:
  observation_model: Observation
  action_model: StepRequest
  reward_model: StepResponse

observation_space:
  type: object
  fields:
    heart_rate: {type: number, unit: bpm}
    systolic_bp: {type: number, unit: mmHg}
    diastolic_bp: {type: number, unit: mmHg}
    mean_arterial_pressure: {type: number, unit: mmHg}
    respiratory_rate: {type: number, unit: breaths_per_min}
    oxygen_saturation: {type: number, unit: percent}
    temperature: {type: number, unit: celsius}
    lactate: {type: number, unit: mmol_L}
    sofa_score: {type: number, unit: points}

action_space:
  type: discrete
  actions:
    - observe
    - administer_antibiotics
    - give_fluids
    - oxygen_therapy
    - start_vasopressors
    - perform_source_control
    - noop

reward_schema:
  range: [0.0, 1.0]
  aggregation: scenario cumulative reward, min-max normalized to [0,1]

termination:
  conditions:
    - clinical stabilization
    - clinical deterioration
    - reaching max steps

logging:
  required_markers:
    - "[START]"
    - "[STEP]"
    - "[END]"
    - "[FINAL]"

reproducibility:
  deterministic_default: true
  optional_llm_mode: true
  manual_input_required: false
  frontend_dependency: false

validation:
  expected_http_status: 200
  required_endpoints:
    - /health
    - /reset
    - /step
    - /state